{% extends 'core/base.html' %}
{% load static %}

{% block title %}Accueil - ALGuide{% endblock %}

{% block hero %}
<section class="hero">
    <div class="hero-content">
        <span class="tag">EXPLORER L'ALGÉRIE</span>
        <h1 class="fade-in">Découvrez l'Algérie autrement</h1>
        <p class="fade-in">Choisissez votre Wilaya et explorez les meilleures destinations</p>

        <form method="post" action="{% url 'home' %}">
            {% csrf_token %}
            <select name="wilaya" id="wilayaSelect" required>
                <option value="">Sélectionner une Wilaya</option>
                {% for wilaya in wilayas %}
                    <option value="{{ wilaya.id }}">{{ wilaya.name }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="exploreBtn" class="explore-btn">Explorer</button>
        </form>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/controller.js' %}"></script>
{% endblock %}
