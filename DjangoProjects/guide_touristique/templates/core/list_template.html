{% extends "base.html" %}

{% block content %}
<h2>{{ category_name }} à {{ wilaya }}</h2>

<div class="cards">
    {% for item in items %}
    <div class="card">
        <img src="{{ item.image.url }}" alt="{{ item.name }}" width="200">
        <h3>{{ item.name }}</h3>
        {% if item.price %}
        <p>Prix: {{ item.price }}</p>
        {% endif %}
        <a href="{{ item.google_maps_link }}" target="_blank">Voir sur Google Maps</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
