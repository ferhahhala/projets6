{% extends 'base.html' %}

{% block title %}Hotels à {{ wilaya }}{% endblock %}

{% block content %}
<h1 class="mb-4">Hotels à {{ wilaya }}</h1>

<form method="get" class="row g-3 mb-4">
    <input type="hidden" name="wilaya" value="{{ wilaya }}">
    <div class="col-md-3">
        <input type="number" name="max_price" class="form-control" placeholder="Prix max" value="{{ request.GET.max_price }}">
    </div>
    <div class="col-md-3">
        <button type="submit" class="btn btn-success w-100">Filtrer</button>
    </div>
</form>

<div class="row">
    {% for h in hotels %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <img src="{{ h.image.url }}" class="card-img-top" alt="{{ h.name }}">
            <div class="card-body">
                <h5 class="card-title">{{ h.name }}</h5>
                <p class="card-text">Prix: {{ h.price }} DA</p>
                <a href="{{ h.google_maps_link }}" target="_blank" class="btn btn-primary">Google Maps</a>
            </div>
        </div>
    </div>
    {% empty %}
    <p>Aucun hôtel trouvé.</p>
    {% endfor %}
</div>
{% endblock %}
